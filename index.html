<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0c1226" />
  <title>푸린네 태교 다이어리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 공유 암호 잠금 (config.js 의 gateHash 가 있을 때만 표시) -->
  <div class="gate" id="gate" hidden>
    <div class="gate-box">
      <div class="gate-title">우리 가족만의 공간</div>
      <div class="gate-sub">암호를 입력해 주세요</div>
      <input type="text" id="gateInput" placeholder="암호" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <label class="gate-show"><input type="checkbox" id="gateShow" checked /> 암호 표시</label>
      <button id="gateBtn">들어가기</button>
      <div class="gate-err" id="gateErr"></div>
    </div>
  </div>

  <div id="app" class="pre">
    <header class="topbar">
      <span class="title">푸린네 태교 다이어리</span>
      <span class="streak" id="streakChip"><span class="ic">🔥</span><span id="streakNum">0</span>일</span>
    </header>

    <!-- ── 홈 화면 ── -->
    <section class="screen active" data-screen="home">
      <div class="scene" id="scene">
        <video class="family" src="puupurin.mp4?v=12" poster="family.png?v=12"
               autoplay muted loop playsinline preload="auto"></video>
      </div>
      <div class="hero">
        <div class="hero-ga" id="heroGa">임신 --주 -일</div>
        <div class="hero-sub" id="heroSub">예정일까지 D--</div>
      </div>

      <div class="progress">
        <div class="progress-top">
          <span id="progLabel">다음 목표</span>
          <span id="progCount">0 / 0일</span>
        </div>
        <div class="bar"><div class="bar-fill" id="barFill"></div></div>
      </div>

      <button class="clear-btn" id="clearBtn">
        <span class="star-ic">★</span><span id="clearLabel">오늘도 무사히 하루 클리어</span>
      </button>
      <button class="catchup" id="catchupBtn" hidden>어제 못 눌렀다면? · 어제도 클리어하기</button>

      <!-- 매일 바뀌는 시스템 응원 -->
      <div class="sys-card">
        <div class="sys-head">
          <span class="sys-label" id="sysLabel">시스템 알림</span>
          <span class="sys-buff" id="sysBuff"></span>
        </div>
        <div class="sys-line" id="sysLine">…</div>
      </div>

      <!-- 오늘의 마음 (산모를 위한 응원) -->
      <div class="letter-card">
        <div class="letter-head"><span class="env">♡</span><span id="letterFrom">오늘의 마음</span></div>
        <div class="letter-body" id="letterBody">…</div>
      </div>
    </section>

    <!-- ── 도감 화면 ── -->
    <section class="screen" data-screen="dex">
      <h2 class="scr-title">우리의 도감</h2>
      <div class="stats" id="stats"></div>
      <h3 class="scr-sub">주수 마일스톤</h3>
      <div class="badges" id="badges"></div>
    </section>

    <!-- ── 편지함(우리 이야기) 화면 ── -->
    <section class="screen" data-screen="letters">
      <h2 class="scr-title">우리 이야기</h2>

      <div class="compose">
        <div class="author-seg">
          <button class="aseg active" data-author="dad">아빠 누오</button>
          <button class="aseg" data-author="mom">엄마 푸린</button>
        </div>
        <textarea id="noteInput" rows="3" placeholder="서로에게 하고 싶은 말을 남겨요"></textarea>
        <div class="compose-row">
          <span class="compose-hint" id="composeHint">이 기기에 저장돼요</span>
          <button class="save-btn" id="saveNote">남기기</button>
        </div>
      </div>

      <h3 class="scr-sub">우리가 주고받은 말</h3>
      <div class="notes" id="notesList"></div>

      <h3 class="scr-sub">지난 응원 메시지</h3>
      <div class="letter-list" id="letterList"></div>
    </section>

    <nav class="tabbar">
      <button class="tab active" data-go="home"><span class="ti">🏠</span>홈</button>
      <button class="tab" data-go="dex"><span class="ti">📖</span>도감</button>
      <button class="tab" data-go="letters"><span class="ti">✉</span>편지함</button>
    </nav>
  </div>

  <div class="confetti" id="confetti" aria-hidden="true"></div>

  <div class="modal-overlay" id="modal" hidden>
    <div class="modal">
      <div class="modal-flash" id="modalFlash"></div>
      <div class="modal-char" id="modalChar"></div>
      <div class="modal-badge" id="modalBadge">24주</div>
      <div class="modal-title" id="modalTitle">생명의 문</div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-letter" id="modalLetter"></div>
      <button class="modal-close" id="modalClose">계속하기</button>
    </div>
  </div>

  <!-- Firebase (다른 기기 간 메시지 공유용 · 설정 안 하면 자동으로 기기 저장 모드) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

  <script src="config.js?v=12"></script>
  <script src="messages.js?v=12"></script>
  <script src="firebase-config.js?v=12"></script>
  <script src="app.js?v=12"></script>
</body>
</html>
